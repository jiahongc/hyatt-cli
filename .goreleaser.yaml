version: 2
project_name: hyatt-pp-cli
changelog:
  disable: true
builds:
  - id: hyatt-pp-cli
    main: ./cmd/hyatt-pp-cli
    binary: hyatt-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X hyatt-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: hyatt-pp-mcp
    main: ./cmd/hyatt-pp-mcp
    binary: hyatt-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: hyatt-pp-cli
    repository:
      owner: jiahongc
      name: homebrew-tap
    homepage: "https://github.com/jiahongc/hyatt-pp-cli"
    description: "Hyatt award availability as a scriptable, local, agent-readable CLI."
    install: |
      bin.install "hyatt-pp-cli"
      bin.install "hyatt-pp-mcp"
